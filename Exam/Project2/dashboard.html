<html>
  <head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style/dashboard.css">
  </head>
  <body>
    <header>
      <div class="header-container">
        <h1 class="title-dashboard">Dashboard Guru</h1>
        <p class="total-student js-total-siswa">Total siswa: 100</p>
      </div>
    </header>

    <div>
      <label>Nama Siswa</label>
      <input type="text" class="js-input-nama">
      <label>Nilai</label>
      <input type="number" class="js-input-nilai" placeholder="0 - 100">
    </div>

    <div>
      <button class="js-btn-tambah">Tambah</button>
      <button class="js-btn-batal">Batal</button>
    </div>

    <div>
      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Nama Siswa</th>
            <th>Nilai</th>
            <th>Hasil</th>
            <th>Aksi</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>1</td>
            <td>Ahmad Setiawan</td>
            <td>80</td>
            <td>B</td>
            <td>
              <button class="button-table">Ubah</button>
              <button class="button-table">Hapus</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="ringkasan-container">
      <div>
        <p>Rata-rata nilai</p>
        <p class="js-rata-rata">70.5</p>
      </div>
      <div>
        <p>Nilai tertinggi</p>
        <p class="js-nilai-tertinggi">90</p>
      </div>
      <div>
        <p>Nilai terendah</p>
        <p class="js-nilai-terendah">60</p>
      </div>
    </div>

    <script src="script/dashboard.js"></script>
  </body>
