<html>
  <head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style/dashboard.css">
  </head>
  <body>
    <header>
      <div class="header-container">
        <h1 class="title-dashboard">Dashboard Guru</h1>
        <p class="total-student">Total siswa: 100</p>
      </div>
    </header>

    <div>
      <label>Nama Siswa</label>
      <input type="text">
      <label>Mata Pelajaran</label>
      <input type="text">
      <label>Nilai</label>
      <input type="number" placeholder="0 - 100">
    </div>

    <div>
      <button>Tambah</button>
      <button>Batal</button>
    </div>

    <div>
      <table>
        <tr>
          <th>No</th>
          <th>Nama</th>
          <th>Mata Pelajaran</th>
          <th>Nilai</th>
          <th>Hasil</th>
          <th>Aksi</th>
        </tr>

        <tr>
          <td>1</td>
          <th>Ahmad Setiawan</th>
          <th>Matematika</th>
          <th>80</th>
          <th>B</th>
          <th>
            <button class="button-table">Ubah</button>
            <button class="button-table">Hapus</button>
          </th>
        </tr>
      </table>
    </div>

    <script src="script/dashboard.js"></script>
  </body>
